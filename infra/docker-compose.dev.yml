services:
  db:
    ports:
      - "127.0.0.1:5432:5432"

  minio:
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"

  backend:
    build:
      target: builder
    command: npm run start:dev
    environment:
      NODE_ENV: development
    volumes:
      - ../backend/src:/app/src:delegated
      - ../backend/prisma:/app/prisma:delegated
      - /app/node_modules
    ports:
      - "3000:3000"
      - "9229:9229"