name: infoagua

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-infoagua}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-infoagua}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-infoagua} -d ${POSTGRES_DB:-infoagua}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - infoagua_net

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-infoagua}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - infoagua_net

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: runner
    restart: unless-stopped
    command: sh -c "npx prisma migrate deploy && node dist/main"
    env_file:
      - ../backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-infoagua}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-infoagua}?schema=public
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_PUBLIC_ENDPOINT: ${STORAGE_PUBLIC_ENDPOINT:-http://localhost:9000}
      STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:-infoagua}
      STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    ports:
      - "0.0.0.0:3000:3000"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - infoagua_net

volumes:
  pgdata:
  minio_data:

networks:
  infoagua_net:
    driver: bridge
